name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      CI: true
      WATCHMAN_DISABLE: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (all)
        run: pnpm lint:all

      - name: Typecheck (all)
        run: pnpm typecheck:all

      - name: Test
        run: pnpm test

      - name: Registry is in sync with component sources
        run: |
          pnpm registry:build
          git diff --exit-code registry.json public/r

      - name: Publish Storybook to Chromatic (PR — fail on visual changes)
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: pnpm chromatic

      # Changes reaching main were already reviewed on the PR build, so accept them
      # as the new baseline and refresh the hosted main--*.chromatic.com Storybook.
      - name: Publish Storybook to Chromatic (main — accept as baseline)
        if: ${{ github.event_name == 'push' }}
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
        run: pnpm chromatic:main
